# Champion's Email Engine - Infrastructure Stack
#
# Services:
#   - PostgreSQL: Relational database for users, campaigns, sequences
#   - Redis: Cache layer + Celery broker
#
# ChampGraph (knowledge graph) runs separately in graphiti-knowledge-graph project.
# ChampMail connects to it via the external Docker network.

networks:
  champions-network:
    driver: bridge

volumes:
  redis-data:
  postgres-data:

services:
  # ============================================
  # PostgreSQL - User Database
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: champions-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-champmail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-champmail_dev}
      POSTGRES_DB: ${POSTGRES_DB:-champmail}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - champions-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-champmail}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis - Cache Layer
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: champions-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    networks:
      - champions-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ============================================
# Usage Instructions
# ============================================
#
# Start infrastructure:
#   docker compose up -d
#
# ChampGraph must be running separately:
#   cd ~/Graphiti-knowledge-graph && docker compose up -d
#
# Stop all services:
#   docker compose down
